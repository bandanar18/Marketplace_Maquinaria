version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: maquinaria_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketplace
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: maquinaria_redis
    ports:
      - '6380:6379'
    restart: unless-stopped

volumes:
  pgdata:
